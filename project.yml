name: BoatNav
options:
  bundleIdPrefix: nl.boatnav
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  BoatNav:
    type: application
    platform: iOS
    sources:
      - BoatNav
    settings:
      base:
        INFOPLIST_FILE: BoatNav/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: nl.boatnav.app
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: BoatNav/Resources/BoatNav.entitlements
    entitlements:
      path: BoatNav/Resources/BoatNav.entitlements
      properties:
        com.apple.developer.carplay-maps: true

  BoatNavTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BoatNavTests
    dependencies:
      - target: BoatNav
    settings:
      base:
        INFOPLIST_FILE: BoatNavTests/Info.plist

  BoatNavUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - BoatNavUITests
    dependencies:
      - target: BoatNav
    settings:
      base:
        INFOPLIST_FILE: BoatNavUITests/Info.plist
