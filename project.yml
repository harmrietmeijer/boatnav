name: BoatNav
options:
  bundleIdPrefix: nl.boatnav
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "3TZFTAC2SR"
  configs:
    Debug:
      DEVELOPMENT_TEAM: "3TZFTAC2SR"
    Release:
      DEVELOPMENT_TEAM: "3TZFTAC2SR"

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios.git
    from: "5.0.0"

targets:
  BoatNav:
    type: application
    platform: iOS
    sources:
      - BoatNav
    dependencies:
      - package: RevenueCat
        product: RevenueCat
    settings:
      base:
        INFOPLIST_FILE: BoatNav/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: nl.boatnav.app
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "3TZFTAC2SR"
        CODE_SIGN_STYLE: Automatic

  BoatNavTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BoatNavTests
    dependencies:
      - target: BoatNav
    settings:
      base:
        INFOPLIST_FILE: BoatNavTests/Info.plist

  BoatNavUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - BoatNavUITests
    dependencies:
      - target: BoatNav
    settings:
      base:
        INFOPLIST_FILE: BoatNavUITests/Info.plist
